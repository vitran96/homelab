# deploy-kubeconfig.yml
---
- name: Deploy Kubeconfig to Target Server
  hosts: target_servers
  vars:
    # Path to the kubeconfig on your LOCAL machine
    local_kubeconfig_path: "~/.kube/config"
    # User on the target machine who should own the kubeconfig
    target_user: "jenkins"
  tasks:
    - name: Ensure target .kube directory exists
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.kube"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0700'

    - name: Copy kubeconfig to target server
      ansible.builtin.copy:
        src: "{{ local_kubeconfig_path }}"
        dest: "/home/{{ target_user }}/.kube/config"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0600'
